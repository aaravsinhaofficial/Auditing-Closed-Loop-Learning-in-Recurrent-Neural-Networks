experiment_name: original_double_integrator_full
output_dir: results/raw
seeds:
  start: 0
  stop: 50
device: cuda
task:
  name: double_integrator
  dt: 1.0
  feedback_strength: 1.0
  observation_noise: 0.0
model:
  name: tanh_rnn
  hidden_size: 100
  recurrent_scale: 0.1
  input_scale: 0.1
  output_scale: 0.1
  leak: 1.0
training:
  epochs: 1001
  batch_size: 100
  eval_batch_size: 10
  steps: 50
  learning_rate: 0.01
  optimizer: SGD
  gradient_clip: 1.0
  control_penalty: 0.005
  zero_initial_action: true
  loss_timing: before_step
  state_loss_reduction: mean_elements
  control_loss_reduction: sum
  normalize_loss_by_steps: false
  open_loop_input: white_noise
analysis:
  min_plateau: 8
