experiment_name: original_double_integrator_full
output_dir: results/raw
seeds:
  start: 0
  stop: 50
device: cpu
task:
  name: double_integrator
  dt: 1.0
  feedback_strength: 1.0
  observation_noise: 0.0
model:
  name: tanh_rnn
  hidden_size: 100
  recurrent_scale: 0.1
  input_scale: 1.0
  output_scale: 1.0
  leak: 1.0
training:
  epochs: 1000
  batch_size: 100
  eval_batch_size: 32
  steps: 50
  learning_rate: 0.01
  optimizer: SGD
  gradient_clip: 1.0
  control_penalty: 0.005
analysis:
  min_plateau: 8
