experiment_name: robustness_maximal
output_dir: results/raw
seeds:
  start: 0
  stop: 15
base:
  device: cuda
  task:
    name: double_integrator
    dt: 1.0
    feedback_strength: 1.0
    observation_noise: 0.0
  model:
    name: tanh_rnn
    hidden_size: 100
    recurrent_scale: 0.1
    input_scale: 1.0
    output_scale: 1.0
  training:
    epochs: 1000
    batch_size: 100
    eval_batch_size: 32
    steps: 50
    learning_rate: 0.01
    optimizer: SGD
    gradient_clip: 1.0
    control_penalty: 0.005
perturbations:
  - name: original
    patch: {}
  - name: lr_low
    patch: {training: {learning_rate: 0.003}}
  - name: lr_high
    patch: {training: {learning_rate: 0.03}}
  - name: init_weak
    patch: {model: {recurrent_scale: 0.03}}
  - name: init_strong
    patch: {model: {recurrent_scale: 0.3}}
  - name: feedback_low
    patch: {task: {feedback_strength: 0.5}}
  - name: feedback_high
    patch: {task: {feedback_strength: 1.5}}
  - name: episode_short
    patch: {training: {steps: 25}}
  - name: episode_long
    patch: {training: {steps: 100}}
  - name: obs_noise
    patch: {task: {observation_noise: 0.05}}
  - name: adam
    patch: {training: {optimizer: Adam, learning_rate: 0.001}}
  - name: high_control_penalty
    patch: {training: {control_penalty: 0.05}}
  - name: no_clip
    patch: {training: {gradient_clip: null}}
