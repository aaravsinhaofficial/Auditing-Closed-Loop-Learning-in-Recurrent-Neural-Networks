experiment_name: smoke_generalization
output_dir: results/raw
seeds: [0]
base:
  device: cuda
  task:
    name: double_integrator
    dt: 1.0
    init_low: -2.0
    init_high: 2.0
    feedback_strength: 1.0
  model:
    name: tanh_rnn
    hidden_size: 10
    recurrent_scale: 0.1
    input_scale: 0.1
    output_scale: 0.1
  training:
    epochs: 3
    batch_size: 5
    eval_batch_size: 5
    steps: 6
    learning_rate: 0.01
    optimizer: SGD
    gradient_clip: 1.0
    control_penalty: 0.0
    zero_initial_action: true
    loss_timing: before_step
    state_loss_reduction: sum_state_mean_batch
    control_loss_reduction: sum
    normalize_loss_by_steps: true
    open_loop_input: white_noise
variants:
  - name: tanh_rnn
    patch: {}
  - name: ring_gru
    patch:
      task: {name: ring, dt: 0.1}
      model: {name: gru, hidden_size: 10}
      training: {optimizer: Adam, learning_rate: 0.003, open_loop_input: teacher_rollout, normalize_loss_by_steps: true, state_loss_reduction: sum_state_mean_batch, control_loss_reduction: mean}
