experiment_name: smoke_seed_sweep
output_dir: results/raw
seeds: [0, 1]
device: cpu
task:
  name: double_integrator
  dt: 1.0
  feedback_strength: 1.0
model:
  name: tanh_rnn
  hidden_size: 12
  recurrent_scale: 0.1
training:
  epochs: 5
  batch_size: 6
  eval_batch_size: 6
  steps: 8
  learning_rate: 0.01
  optimizer: SGD
  gradient_clip: 1.0
  control_penalty: 0.005
analysis:
  min_plateau: 2
