experiment_name: smoke_double_integrator
output_dir: results/raw
seed: 0
device: cuda
task:
  name: double_integrator
  dt: 1.0
  feedback_strength: 1.0
  observation_noise: 0.0
model:
  name: tanh_rnn
  hidden_size: 16
  recurrent_scale: 0.1
  input_scale: 1.0
  output_scale: 1.0
  leak: 1.0
training:
  epochs: 8
  batch_size: 8
  eval_batch_size: 8
  steps: 12
  learning_rate: 0.01
  optimizer: SGD
  gradient_clip: 1.0
  control_penalty: 0.005
analysis:
  min_plateau: 3
