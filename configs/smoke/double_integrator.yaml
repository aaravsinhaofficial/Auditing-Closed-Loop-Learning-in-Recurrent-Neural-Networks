experiment_name: smoke_double_integrator
output_dir: results/raw
seed: 0
device: cuda
task:
  name: double_integrator
  dt: 1.0
  feedback_strength: 1.0
  observation_noise: 0.0
model:
  name: tanh_rnn
  hidden_size: 16
  recurrent_scale: 0.1
  input_scale: 0.1
  output_scale: 0.1
  leak: 1.0
training:
  epochs: 8
  batch_size: 8
  eval_batch_size: 8
  steps: 12
  learning_rate: 0.01
  optimizer: SGD
  gradient_clip: 1.0
  control_penalty: 0.005
  zero_initial_action: true
  loss_timing: before_step
  state_loss_reduction: mean_elements
  control_loss_reduction: sum
  normalize_loss_by_steps: false
  open_loop_input: white_noise
analysis:
  min_plateau: 3
