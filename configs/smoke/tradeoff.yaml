experiment_name: smoke_tradeoff
output_dir: results/raw
seeds:
  start: 0
  stop: 1
control_penalties: [0.0, 0.05]
base:
  device: cuda
  task:
    name: double_integrator
    dt: 1.0
    feedback_strength: 1.0
  model:
    name: tanh_rnn
    hidden_size: 8
    recurrent_scale: 0.1
  training:
    epochs: 4
    batch_size: 8
    eval_batch_size: 4
    steps: 6
    evaluation_horizons: [3, 6, 8]
    horizon_eval_interval: 1
    learning_rate: 0.01
    optimizer: SGD
    gradient_clip: 1.0
    control_penalty: 0.005
  analysis:
    min_plateau: 2
